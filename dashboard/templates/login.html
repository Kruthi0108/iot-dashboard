<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<style>

body{
    font-family:Arial;
    background:#f5f7fa;
}

.box{
    width:350px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 4px 12px
    rgba(0,0,0,0.15);
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#1e293b;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h1>Login</h1>

<form method="POST">

{% csrf_token %}

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

</div>

</body>
</html>
